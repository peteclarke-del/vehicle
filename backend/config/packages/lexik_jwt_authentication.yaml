lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    token_ttl: 3600
    token_extractors:
        authorization_header:
            enabled: true
            prefix: Bearer
            name: Authorization
        query_parameter:
            # Disabled: tokens in URLs are logged and can leak via Referer/history.
            # The SSE notification stream uses its own resolveUser() method
            # with a manually decoded query token for EventSource compatibility.
            enabled: false
            name: token
        cookie:
            enabled: false
